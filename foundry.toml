[profile.default]
src = "contracts"
out = "out"
libs = ["node_modules", "lib"]
test = "test"
script = "script"
cache_path = "cache"
solc_version = "0.8.26"
optimizer = true
optimizer_runs = 200
via_ir = false
evm_version = "cancun"
bytecode_hash = "none"

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true

[profile.ci]
fuzz = { runs = 5000 }
invariant = { runs = 256, depth = 15 }
