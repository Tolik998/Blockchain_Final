specVersion: 1.0.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: InsuranceVault
    network: sepolia
    source:
      address: "0x310b42e5092def354c30844503fba2925dccac59"
      abi: VaultAbi
      startBlock: 10800000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - VaultDeposit
        - VaultWithdraw
      abis:
        - name: VaultAbi
          file: ./abis/VaultAbi.json
      file: ./src/mapping.ts
      eventHandlers:
        - event: Deposit(indexed address,indexed address,uint256,uint256)
          handler: handleVaultDeposit
        - event: Withdraw(indexed address,indexed address,indexed address,uint256,uint256)
          handler: handleVaultWithdraw

  - kind: ethereum
    name: PolicyManager
    network: sepolia
    source:
      address: "0x770dbcec771216667a4558deb649a51c44cc589d"
      abi: PolicyAbi
      startBlock: 10800000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - PolicyPurchase
      abis:
        - name: PolicyAbi
          file: ./abis/PolicyAbi.json
      file: ./src/mapping.ts
      eventHandlers:
        - event: PolicyPurchased(indexed uint256,indexed address,uint256,uint256,uint48)
          handler: handlePolicyPurchased

  - kind: ethereum
    name: ClaimProcessor
    network: sepolia
    source:
      address: "0x644635684fe8ace38a58e64f247774a40604dd56"
      abi: ClaimAbi
      startBlock: 10800000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - ClaimProcessed
      abis:
        - name: ClaimAbi
          file: ./abis/ClaimAbi.json
      file: ./src/mapping.ts
      eventHandlers:
        - event: ClaimProcessed(indexed uint256,indexed address,uint256,int256)
          handler: handleClaimProcessed

  - kind: ethereum
    name: ProtocolTreasury
    network: sepolia
    source:
      address: "0xC3965d1Cf88F42350658d370c1e72fDF4A27151B"
      abi: TreasuryAbi
      startBlock: 10800000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - TreasuryWithdraw
      abis:
        - name: TreasuryAbi
          file: ./abis/TreasuryAbi.json
      file: ./src/mapping.ts
      eventHandlers:
        - event: Withdrawn(indexed address,indexed address,uint256)
          handler: handleTreasuryWithdraw