specVersion: 1.0.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: InsuranceVault
    network: arbitrum-sepolia
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: VaultAbi
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - VaultDeposit
        - VaultWithdraw
      abis:
        - name: VaultAbi
          file: ./abis/VaultAbi.json
      file: ./src/mapping.ts
      eventHandlers:
        - event: Deposit(indexed address,indexed address,uint256,uint256)
          handler: handleVaultDeposit
        - event: Withdraw(indexed address,indexed address,indexed address,uint256,uint256)
          handler: handleVaultWithdraw
  - kind: ethereum
    name: PolicyManager
    network: arbitrum-sepolia
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: PolicyAbi
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - PolicyPurchase
      abis:
        - name: PolicyAbi
          file: ./abis/PolicyAbi.json
      file: ./src/mapping.ts
      eventHandlers:
        - event: PolicyPurchased(indexed uint256,indexed address,uint256,uint256,uint48)
          handler: handlePolicyPurchased
  - kind: ethereum
    name: ClaimProcessor
    network: arbitrum-sepolia
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: ClaimAbi
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - ClaimProcessed
      abis:
        - name: ClaimAbi
          file: ./abis/ClaimAbi.json
      file: ./src/mapping.ts
      eventHandlers:
        - event: ClaimProcessed(indexed uint256,indexed address,uint256,int256)
          handler: handleClaimProcessed
  - kind: ethereum
    name: ProtocolTreasury
    network: arbitrum-sepolia
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: TreasuryAbi
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - TreasuryWithdraw
      abis:
        - name: TreasuryAbi
          file: ./abis/TreasuryAbi.json
      file: ./src/mapping.ts
      eventHandlers:
        - event: Withdrawn(indexed address,indexed address,uint256)
          handler: handleTreasuryWithdraw
