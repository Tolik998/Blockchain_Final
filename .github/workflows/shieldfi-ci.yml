name: shieldfi-ci

on:
  push:
  pull_request:

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install npm deps (OpenZeppelin)
        run: npm install

      - name: Forge build (with sizes)
        run: forge build --sizes

      - name: Forge test
        run: forge test -vvv

      - name: Forge coverage (summary)
        run: forge coverage --report summary 2>&1 | tee coverage-summary.txt

      - name: Assert coverage >= 90% lines on production contracts
        run: |
          # Extract the Total line from forge coverage summary and check % Lines
          LINES_PCT=$(grep "^| Total" coverage-summary.txt | awk -F'|' '{print $2}' | grep -oP '[0-9]+\.[0-9]+' | head -1)
          echo "Total line coverage: ${LINES_PCT}%"
          python3 -c "
          import sys
          pct = float('${LINES_PCT}')
          if pct < 90:
              print(f'FAIL: line coverage {pct}% < 90%')
              sys.exit(1)
          else:
              print(f'PASS: line coverage {pct}% >= 90%')
          "

      - name: Solhint lint
        run: npm run lint:sol

      - name: Prettier format check
        run: npm run lint:prettier

      - name: Slither static analysis
        uses: crytic/slither-action@v0.4.0
        with:
          node-version: "22"
          fail-on: high

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web deps
        run: npm install

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Build web
        run: npm run build
