name: shieldfi-ci

on:
  push:
  pull_request:

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install npm deps (OpenZeppelin)
        run: npm install

      - name: Ensure forge-std is available
        run: |
          if [ ! -f "lib/forge-std/src/Test.sol" ]; then
            echo "forge-std missing — installing..."
            rm -rf lib/forge-std
            git config --global url."https://github.com/".insteadOf "git@github.com:"
            forge install foundry-rs/forge-std --no-commit --shallow
          else
            echo "forge-std OK"
          fi

      - name: Forge build
        run: forge build

      - name: Forge test
        run: forge test -vvv

      - name: Forge coverage (informational)
        run: forge coverage --report summary 2>&1 | tee coverage-summary.txt || true

      - name: Show coverage summary
        run: cat coverage-summary.txt || true

      - name: Solhint lint
        run: npm run lint:sol || true

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web deps
        run: npm install

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Build web
        run: npm run build
